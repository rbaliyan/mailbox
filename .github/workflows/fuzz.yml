name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # weekly on Monday at 03:00 UTC

permissions: read-all

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Fuzz ValidateSubject
        run: go test -run='^$' -fuzz=FuzzValidateSubject -fuzztime=90s .

      - name: Fuzz ValidateBody
        run: go test -run='^$' -fuzz=FuzzValidateBody -fuzztime=90s .

      - name: Fuzz ValidateMIMEType
        run: go test -run='^$' -fuzz=FuzzValidateMIMEType -fuzztime=90s .

      - name: Fuzz ValidateHeaders
        run: go test -run='^$' -fuzz=FuzzValidateHeaders -fuzztime=90s .
