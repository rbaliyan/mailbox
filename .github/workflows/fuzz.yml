name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # weekly on Monday at 03:00 UTC

permissions: read-all

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      # Persist the generated fuzz corpus between runs so the weekly campaign
      # accumulates coverage instead of restarting cold.
      - name: Cache fuzz corpus
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ runner.os }}-

      - name: Fuzz all targets
        env:
          # Longer budget on the weekly cron; short smoke budget on push/PR.
          FUZZTIME: ${{ github.event_name == 'schedule' && '300s' || '40s' }}
        run: ./scripts/fuzz_all.sh

      # On a crash, Go writes a minimized reproducer under testdata/fuzz; upload
      # it so the failing input can be replayed (go test -run=FuzzX/<hash>).
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"
          if-no-files-found: ignore
